<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background -->
  <rect width="64" height="64" rx="10" fill="#020205"/>

  <!-- TV Body -->
  <rect x="8" y="18" width="48" height="34" rx="5" fill="#111827"/>
  <rect x="8" y="18" width="48" height="34" rx="5" stroke="#00f2ff" stroke-width="1.5" stroke-opacity="0.6"/>

  <!-- Screen glow -->
  <rect x="13" y="23" width="38" height="24" rx="3" fill="#001a1f"/>
  <rect x="13" y="23" width="38" height="24" rx="3" fill="url(#screenGlow)"/>
  <rect x="13" y="23" width="38" height="24" rx="3" stroke="#00f2ff" stroke-width="1" stroke-opacity="0.9"/>

  <!-- Scanlines on screen -->
  <line x1="13" y1="28" x2="51" y2="28" stroke="#00f2ff" stroke-width="0.4" stroke-opacity="0.25"/>
  <line x1="13" y1="32" x2="51" y2="32" stroke="#00f2ff" stroke-width="0.4" stroke-opacity="0.25"/>
  <line x1="13" y1="36" x2="51" y2="36" stroke="#00f2ff" stroke-width="0.4" stroke-opacity="0.25"/>
  <line x1="13" y1="40" x2="51" y2="40" stroke="#00f2ff" stroke-width="0.4" stroke-opacity="0.25"/>

  <!-- Screen content: pixel grid dots -->
  <circle cx="24" cy="35" r="1.5" fill="#ff4444" opacity="0.8"/>
  <circle cx="28" cy="35" r="1.5" fill="#44ff44" opacity="0.8"/>
  <circle cx="32" cy="35" r="1.5" fill="#4444ff" opacity="0.8"/>
  <circle cx="36" cy="35" r="1.5" fill="#00f2ff" opacity="0.8"/>

  <!-- TV stand/legs -->
  <rect x="24" y="52" width="4" height="6" rx="1" fill="#1a2535"/>
  <rect x="36" y="52" width="4" height="6" rx="1" fill="#1a2535"/>
  <rect x="20" y="57" width="24" height="2.5" rx="1.25" fill="#1a2535" stroke="#00f2ff" stroke-width="0.5" stroke-opacity="0.5"/>

  <!-- Antenna left -->
  <line x1="26" y1="18" x2="20" y2="8" stroke="#00f2ff" stroke-width="1.5" stroke-linecap="round" opacity="0.9"/>
  <!-- Antenna right -->
  <line x1="38" y1="18" x2="44" y2="8" stroke="#00f2ff" stroke-width="1.5" stroke-linecap="round" opacity="0.9"/>

  <!-- Antenna dots -->
  <circle cx="20" cy="8" r="1.5" fill="#00f2ff"/>
  <circle cx="44" cy="8" r="1.5" fill="#00f2ff"/>

  <!-- Screen center glow spark -->
  <circle cx="32" cy="35" r="6" fill="#00f2ff" opacity="0.06"/>

  <defs>
    <radialGradient id="screenGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#00f2ff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#00f2ff" stop-opacity="0.03"/>
    </radialGradient>
  </defs>
</svg>